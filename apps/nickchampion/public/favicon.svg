<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#1e3a8a"/>
  <!-- Outer vault ring -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="4"/>
  <!-- Vault bolts N / E / S / W -->
  <circle cx="50" cy="14" r="5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="86" cy="50" r="5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="50" cy="86" r="5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="14" cy="50" r="5" fill="rgba(255,255,255,0.7)"/>
  <!-- Vault face -->
  <circle cx="50" cy="50" r="24" fill="rgba(255,255,255,0.1)" stroke="white" stroke-width="2.5"/>
  <!-- Combination dial ring -->
  <circle cx="50" cy="50" r="14" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.5"/>
  <!-- Handle arm (~1 o'clock) -->
  <line x1="50" y1="50" x2="63" y2="27" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Handle knob -->
  <circle cx="63" cy="27" r="5.5" fill="white"/>
  <circle cx="63" cy="27" r="2" fill="#1e3a8a"/>
  <!-- Centre hub (on top) -->
  <circle cx="50" cy="50" r="7" fill="white"/>
</svg>
